  /v1/templates/{template_id}/import:
    parameters:
      - name: template_id
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Start import for an existing template record
      tags:
        - Templates
      security:
        - ApiKeyAuth: []
      responses:
        '202':
          description: Import job accepted
          content:
            application/json:
              schema:
                type: object
