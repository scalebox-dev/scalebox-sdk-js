                $ref: '#/components/schemas/Error'

  /v1/import-jobs:
    get:
      summary: List import jobs for current user
      tags:
        - ImportJobs
      security:
        - ApiKeyAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: skip
          in: query
          schema:
            type: integer
            minimum: 0
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, running, completed, failed, cancelled, ongoing]
          description: Filter by job status; `ongoing` matches pending or running jobs
        - name: template_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated import jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ListImportJobsResponseData'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/import-jobs/{job_id}:
    parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get import job by ID
      tags:
        - ImportJobs
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Import job
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ImportJobDetailData'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Cancel import job by ID
      tags:
        - ImportJobs
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/TemplateImportCancelData'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY

  schemas:
    CreateSandboxRequest:
      type: object
      properties:
        name:
          type: string
          description: Sandbox name
        description:
          type: string
          description: Sandbox description
        template:
          type: string
          description: Template name or ID (defaults to "base")
        project_id:
          type: string
          description: Project ID (optional, defaults to user's default project)
        cpu_count:
          type: integer
          minimum: 1
          description: Number of CPU cores
        memory_mb:
          type: integer
          minimum: 128
          description: Memory in MB
        storage_gb:
          type: integer
          minimum: 0
          description: Storage in GB
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Flexible key-value metadata
        timeout:
          type: integer
          minimum: 60
          maximum: 86400
          description: Timeout in seconds (defaults to 300)
        env_vars:
          type: object
          additionalProperties:
            type: string
          description: Environment variables
        secure:
          type: boolean
          default: true
          description: Security setting
        allow_internet_access:
          type: boolean
          default: true
          description: Internet access setting
        auto_pause:
          type: boolean
          default: false
          description: If true, timeout causes auto-pause; if false, timeout causes termination (IMMUTABLE)
        custom_ports:
          type: array
          items:
            $ref: '#/components/schemas/PortConfig'
          description: Optional custom ports (ports not in template). Must have unique port numbers and names.
        net_proxy_country:
          type: string
          enum: [united-states, canada, japan, malaysia, brazil, france, italy, china, hong-kong]
          description: Network proxy country for sandbox traffic routing (optional)
        locality:
          $ref: '#/components/schemas/LocalityConfig'
          description: Locality preferences for sandbox scheduling (optional)
        object_storage:
          type: array
          items:
            $ref: '#/components/schemas/ObjectStorageConfig'
          description: |
            Object storage mounts (S3-compatible). Accepts a single object (legacy)
            or an array. mount_point must be absolute path. At least one of region
            or endpoint required per mount.
        object_storage_direct_mount:
          type: boolean
          description: |
            When true, worker container mounts object storage via s3fs directly
            (worker image must have s3fs installed). When false/omitted, sidecar
            handles mount. Only for custom templates.
        s3fs_executable_path:
          type: string
          description: |
            Path to s3fs binary in worker container. Only used when
            object_storage_direct_mount is true. Defaults to "s3fs".
        is_async:
          type: boolean
          default: false
          description: |
            When true, return immediately (client polls for status).
            When false/omitted, wait until running or failed (default).

    UpdateSandboxRequest:
      type: object
      required:
        - timeout
      properties:
        timeout:
          type: integer
          minimum: 1
          description: New timeout in seconds (must be greater than current timeout)

    SandboxTimeoutRequest:
      type: object
      required:
        - timeout
      properties:
        timeout:
          type: integer
          minimum: 1
          description: New timeout in seconds (must be >= already used lifetime)

    SandboxStatusResponse:
      type: object
      description: Lightweight status for polling (GET /v1/sandboxes/{sandbox_id}/status)
      properties:
        sandbox_id:
          type: string
          description: Sandbox ID
        status:
          type: string
          enum: [created, starting, running, pausing, paused, resuming, terminating, terminated, failed]
          description: Current sandbox status
        substatus:
          type: string
          enum: [allocating, deploying, initializing, waiting_ready, cleaning_resources, cleaning_data]
          nullable: true
          description: Detailed substatus for transitional states
        reason:
          type: string
          nullable: true
          description: Reason for current status or failure
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp

    SandboxResponse:
      type: object
      properties:
        sandbox_id:
          type: string
          description: Unique sandbox identifier
        name:
          type: string
          description: Sandbox name
        description:
          type: string
          description: Sandbox description
        template_id:
          type: string
          description: Template ID
        template_name:
          type: string
          description: Template name
        owner_user_id:
          type: string
          description: Owner user ID
        project_id:
          type: string
          description: Project ID
        project_name:
          type: string
          description: Project name
        cpu_count:
          type: integer
          description: Number of CPU cores
        memory_mb:
          type: integer
          description: Memory in MB
        storage_gb:
          type: integer
          description: Storage in GB
        timeout:
          type: integer
          description: Timeout in seconds
        secure:
          type: boolean
          description: Security setting
        allow_internet_access:
          type: boolean
          description: Internet access setting
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Metadata key-value pairs
        env_vars:
          type: object
          additionalProperties:
            type: string
          description: Environment variables
        status:
          type: string
          enum: [created, starting, running, pausing, paused, resuming, terminating, terminated, failed]
          description: Current sandbox status
        substatus:
          type: string
          enum: [allocating, deploying, initializing, waiting_ready, cleaning_resources, cleaning_data]
          description: Detailed substatus for transitional states
        reason:
          type: string
          description: Reason for current status or failure
        started_at:
          type: string
          format: date-time
          description: When sandbox started running
          nullable: true
        stopped_at:
          type: string
          format: date-time
          description: When sandbox stopped
          nullable: true
        timeout_at:
          type: string
          format: date-time
          description: When sandbox will timeout
          nullable: true
        ended_at:
          type: string
          format: date-time
          description: When sandbox lifecycle ended
          nullable: true
        paused_at:
          type: string
          format: date-time
          description: When sandbox was last paused
          nullable: true
        pausing_at:
          type: string
          format: date-time
          description: When sandbox pause operation started
          nullable: true
        resumed_at:
          type: string
          format: date-time
          description: When sandbox was last resumed
          nullable: true
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        sandbox_domain:
          type: string
          description: Sandbox access domain
          nullable: true
        envd_access_token:
          type: string
          description: Token for sandbox access
          nullable: true
        uptime:
          type: integer
          description: Uptime in seconds
        total_running_seconds:
          type: integer
          description: Cumulative running time across all running phases (persistent)
        actual_total_running_seconds:
          type: integer
          format: int64
          description: Dynamic total running time including current phase if running
        total_paused_seconds:
          type: integer
          description: Cumulative paused time across all pause periods (persistent)
        actual_total_paused_seconds:
          type: integer
          description: Dynamic total paused time including current pause if paused
        persistence_days:
          type: integer
          description: Number of days sandbox data persists after termination (from plan)
        persistence_expires_at:
          type: string
          format: date-time
          description: When sandbox data will be permanently deleted
          nullable: true
        persistence_days_remaining:
          type: integer
          description: Days remaining until data deletion
          nullable: true
        auto_pause:
          type: boolean
          description: If true, timeout causes auto-pause; if false, termination (IMMUTABLE)
        network_proxy:
          type: object
          description: Network proxy config (when token generated)
          nullable: true
          properties:
            proxy_url:
              type: string
              description: Full proxy URL (username:password@host:port)
            proxy_configs:
              type: object
              properties:
                host:
                  type: string
                port:
                  type: integer
                username:
                  type: string
                password:
                  type: string
        ports:
          type: array
          items:
            $ref: '#/components/schemas/PortConfig'
          description: All ports (template ports + custom ports)
        template_ports:
          type: array
          items:
            $ref: '#/components/schemas/PortConfig'
          description: Ports from template
        custom_ports:
          type: array
          items:
            $ref: '#/components/schemas/PortConfig'
          description: Custom ports added to sandbox
        net_proxy_country:
          type: string
          enum: [united-states, canada, japan, malaysia, brazil, france, italy, china, hong-kong]
          description: Network proxy country setting
          nullable: true
        # Object storage mount information
        object_storage:
          type: array
          items:
            $ref: '#/components/schemas/ObjectStorageInfo'
          description: Object storage mounts (multi-path support, array format)
        object_storage_direct_mount:
          type: boolean
          description: Whether object storage is directly mounted via s3fs
        object_storage_s3fs_path:
          type: string
          description: S3fs executable path used for direct mount
          nullable: true
        # Kubernetes deployment information
        cluster_id:
          type: string
          description: Kubernetes cluster ID where sandbox is deployed
          nullable: true
        namespace_id:
          type: string
          description: User namespace ID in the cluster
          nullable: true
        pod_name:
          type: string
          description: Kubernetes pod name
          nullable: true
        pod_uid:
          type: string
          description: Kubernetes pod UID
          nullable: true
        pod_ip:
          type: string
          description: Pod IP address
          nullable: true
        node_name:
          type: string
          description: Node where pod is scheduled
          nullable: true
        container_name:
          type: string
          description: Container name within the pod
          nullable: true
        allocation_time:
          type: string
          format: date-time
          description: When sandbox was allocated to cluster
          nullable: true
        last_pod_status:
          type: string
          description: Last known Kubernetes pod status
          nullable: true
        # State management information
        deletion_in_progress:
          type: boolean
          description: Whether sandbox deletion is in progress
          default: false
        resources:
          type: object
          properties:
            cpu:
              type: integer
              description: CPU cores allocated
            memory:
              type: integer
              description: Memory in MB allocated
            storage:
              type: integer
              description: Storage in GB allocated
            bandwidth:
              type: integer
              description: Bandwidth allocation (placeholder)
        cost:
          type: object
          properties:
            hourlyRate:
              type: number
              format: float
              description: Hourly rate for this sandbox
            totalCost:
              type: number
              format: float
              description: Total cost accumulated
        owner:
          type: object
          properties:
            user_id:
              type: string
              description: User ID of the owner
            username:
              type: string
              description: Username of the owner
            display_name:
              type: string
              description: Display name of the owner
              nullable: true
            email:
              type: string
              description: Email of the owner
        # Computed / extended fields
        remaining_seconds:
          type: integer
          description: Computed remaining time until timeout
          nullable: true
        template_exists:
          type: boolean
          description: Whether the template still exists
        template_custom_command:
          type: string
          description: Template custom startup command
          nullable: true
        template_ready_command:
          type: string
          description: Template readiness probe command
          nullable: true
        template_source:
          type: string
          description: Template source/image information
          nullable: true
        sandbox_domain_internal:
          type: string
          description: Internal domain name for sandbox
          nullable: true
        lifecycle_outcome:
          type: string
          description: NFS archive status (completed, protected, archiving)
          nullable: true
        web_terminal_available:
          type: boolean
          description: Whether web terminal is available
        web_files_available:
          type: boolean
          description: Whether web file browser is available

    SandboxDeploymentResponse:
      type: object
      properties:
        sandbox_id:
          type: string
          description: Sandbox ID
        cluster_id:
          type: string
          description: Cluster ID where sandbox is deployed
        namespace:
          type: string
          description: Kubernetes namespace
        access_url:
          type: string
          description: External access URL
        internal_url:
          type: string
          description: Internal cluster URL
        access_token:
          type: string
          description: Access token for the sandbox
        status:
          type: string
          description: Deployment status
        deployment_at:
          type: string
          format: date-time
          description: Deployment timestamp
        deployment:
          type: string
          description: Kubernetes deployment name
        service:
          type: string
          description: Kubernetes service name
        ingress:
          type: string
          description: Kubernetes ingress name
        sandbox_type:
          type: string
          description: Type of sandbox deployed
        driver_version:
          type: string
          description: Driver version used for deployment

    SandboxStatsResponse:
      type: object
      properties:
        total_sandboxes:
          type: integer
          description: Total number of sandboxes
        running_sandboxes:
          type: integer
          description: Number of running sandboxes
        terminated_sandboxes:
          type: integer
          description: Number of terminated sandboxes
        failed_sandboxes:
          type: integer
          description: Number of failed sandboxes
        total_cost:
          type: number
          format: float
          description: Total cost accumulated
        avg_cpu_usage:
          type: number
          format: float
          description: Average CPU usage percentage
        avg_memory_usage:
          type: number
          format: float
          description: Average memory usage percentage
        total_uptime_hours:
          type: number
          format: float
          description: Total uptime in hours

    BatchDeleteRequest:
      type: object
      required:
        - sandbox_ids
      properties:
        sandbox_ids:
          type: array
          items:
            type: string
          description: List of sandbox IDs to delete
        force:
          type: boolean
          default: false
          description: Force deletion even if sandboxes are running

    BatchDeleteResponse:
      type: object
      properties:
        successful_count:
          type: integer
          description: Number of successfully deleted sandboxes
        failed_count:
          type: integer
          description: Number of failed deletions
        successful:
          type: array
          items:
            type: string
          description: List of successfully deleted sandbox IDs
        failed:
          type: array
          items:
            type: object
            properties:
              sandbox_id:
                type: string
              error:
                type: string
          description: List of failed deletions with errors

    BatchIdsRequest:
      type: object
      required:
        - sandbox_ids
      properties:
        sandbox_ids:
          type: array
          items:
            type: string
          description: List of sandbox IDs

    BatchTerminateRequest:
      type: object
      required:
        - sandbox_ids
      properties:
        sandbox_ids:
          type: array
          items:
            type: string
          description: List of sandbox IDs to terminate
        force:
          type: boolean
          default: false
          description: Force termination even if sandboxes are running

    BatchOperationResult:
      type: object
      properties:
        sandbox_id:
          type: string
        status:
          type: string
          enum: [success, error]
        error:
          type: string
          description: Error message when status is error

    BatchOperationResponse:
      type: object
      properties:
        total:
