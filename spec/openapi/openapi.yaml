openapi: 3.0.3
info:
  title: Scalebox API
  description: Scalebox Cloud Sandbox API
  version: 1.0.0
  contact:
    name: Scalebox Team
    url: https://scalebox.dev
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.scalebox.dev
    description: Production server
  - url: https://staging-api.scalebox.dev
    description: Staging server

paths:
  /v1/sandboxes:
    post:
      summary: Create a new sandbox
      description: Create a new sandbox instance
      tags:
        - Sandboxes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSandboxRequest'
      responses:
        '201':
          description: Sandbox created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SandboxResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      summary: List sandboxes
      description: Get list of sandboxes
      tags:
        - Sandboxes
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
          description: Filter by project ID
        - name: status
          in: query
          schema:
            type: string
            enum: [created, starting, running, pausing, paused, resuming, terminating, terminated, failed]
          description: Filter by status
        - name: owner_user_id
          in: query
          schema:
            type: string
          description: Filter by owner user ID (root users only)
        - name: search
          in: query
          schema:
            type: string
          description: Search in sandbox names
        - name: sort_by
          in: query
          schema:
            type: string
          description: Sort by field
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
          description: Sort order
        - name: limit
          in: query
          schema:
            type: integer
          description: Maximum number of results per page
        - name: page_size
          in: query
          schema:
            type: integer
          description: Alias for limit (page size)
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
          description: 1-based page index (default 1). When offset or skip is set, the effective page is derived on the server.
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
          description: Number of rows to skip before returning results
        - name: skip
          in: query
          schema:
            type: integer
            minimum: 0
          description: Alias for offset
      responses:
        '200':
          description: List of sandboxes
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ListSandboxesResponseData'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/sandboxes/{sandbox_id}:
    get:
      summary: Get sandbox details
      description: Get details of a specific sandbox
      tags:
        - Sandboxes
      parameters:
        - name: sandbox_id
          in: path
          required: true
          schema:
            type: string
          description: Sandbox ID
      responses:
        '200':
          description: Sandbox details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SandboxResponse'
        '404':
          description: Sandbox not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Update sandbox
      description: Update sandbox settings (mainly timeout)
      tags:
        - Sandboxes
      parameters:
        - name: sandbox_id
          in: path
          required: true
          schema:
            type: string
          description: Sandbox ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSandboxRequest'
      responses:
        '200':
          description: Sandbox updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Sandbox not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete sandbox
      description: Delete a sandbox instance
      tags:
        - Sandboxes
      parameters:
        - name: sandbox_id
          in: path
          required: true
          schema:
            type: string
          description: Sandbox ID
        - name: force
          in: query
          schema:
            type: boolean
            default: true
          description: Force deletion even if sandbox is running
      responses:
        '202':
          description: Sandbox deletion initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      sandbox_id:
                        type: string
                      status:
                        type: string
                      note:
                        type: string
                  message:
                    type: string
        '404':
          description: Sandbox not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/sandboxes/{sandbox_id}/status:
    get:
      summary: Get sandbox status (lightweight)
      description: Returns only sandbox_id, status, substatus, reason, updated_at for polling. Use this instead of GET /v1/sandboxes/{sandbox_id} for status polling to reduce payload.
      tags:
        - Sandboxes
      parameters:
        - name: sandbox_id
          in: path
          required: true
          schema:
            type: string
          description: Sandbox ID
      responses:
        '200':
          description: Sandbox status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SandboxStatusResponse'
        '404':
          description: Sandbox not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/sandboxes/{sandbox_id}/pause:
    post:
      summary: Pause a running sandbox
      description: Pause a running sandbox. Default (sync) waits until paused or failed. Pass is_async in body to return immediately.
      tags:
        - Sandboxes
      parameters:
        - name: sandbox_id
          in: path
          required: true
          schema:
            type: string
          description: Sandbox ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                is_async:
                  type: boolean
                  default: false
                  description: When true, return immediately; when false, wait until paused/failed
      responses:
        '200':
          description: Sandbox paused (sync) or pause initiated (async)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          description: Sandbox not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/sandboxes/{sandbox_id}/resume:
    post:
      summary: Resume a paused sandbox
      description: Resume a paused sandbox. Default (sync) waits until running or failed. Pass is_async in body to return immediately. Deprecated - prefer /connect endpoint.
      deprecated: true
      tags:
        - Sandboxes
      parameters:
        - name: sandbox_id
          in: path
          required: true
          schema:
            type: string
          description: Sandbox ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                is_async:
                  type: boolean
                  default: false
                  description: When true, return immediately; when false, wait until running/failed
      responses:
        '200':
          description: Sandbox resumed (sync) or resume initiated (async)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          description: Sandbox not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/sandboxes/{sandbox_id}/timeout:
    put:
      summary: Update sandbox timeout
      description: Update the timeout for a sandbox
      tags:
        - Sandboxes
      parameters:
        - name: sandbox_id
          in: path
          required: true
          schema:
            type: string
          description: Sandbox ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SandboxTimeoutRequest'
      responses:
        '200':
          description: Timeout updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      timeout:
                        type: integer
                      timeout_at:
                        type: string
                        format: date-time
                      used_lifetime:
                        type: integer
                      remaining_time:
                        type: integer
                  message:
                    type: string
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/sandboxes/{sandbox_id}/ports:
    get:
      summary: Get sandbox ports
      description: Get all ports (template + custom) for a sandbox
      tags:
        - Sandboxes
      parameters:
        - name: sandbox_id
          in: path
          required: true
          schema:
            type: string
          description: Sandbox ID
      responses:
        '200':
          description: Port list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      ports:
                        type: array
                        items:
                          $ref: '#/components/schemas/PortConfig'
                      template_ports:
                        type: array
                        items:
                          $ref: '#/components/schemas/PortConfig'
                      custom_ports:
                        type: array
                        items:
                          $ref: '#/components/schemas/PortConfig'
        '404':
          description: Sandbox not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    
    post:
      summary: Add custom port to sandbox
      description: Add a custom port to a running sandbox
      tags:
        - Sandboxes
      parameters:
        - name: sandbox_id
          in: path
          required: true
          schema:
            type: string
          description: Sandbox ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - port
                - name
              properties:
                port:
                  type: integer
                  format: int32
                  description: Port number
                service_port:
                  type: integer
                  format: int32
                  description: Service port (defaults to port)
                protocol:
                  type: string
                  enum: [TCP, UDP]
                  default: TCP
                  description: Port protocol
                name:
                  type: string
                  description: Port name
      responses:
        '200':
          description: Port added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SandboxResponse'
                  message:
                    type: string
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Sandbox not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/sandboxes/{sandbox_id}/ports/{port}:
    delete:
      summary: Remove custom port from sandbox
      description: Remove a custom port from a running sandbox
      tags:
        - Sandboxes
      parameters:
        - name: sandbox_id
          in: path
          required: true
          schema:
            type: string
          description: Sandbox ID
        - name: port
          in: path
          required: true
          schema:
            type: integer
            format: int32
          description: Port number to remove
      responses:
        '200':
          description: Port removed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Sandbox not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/sandboxes/{sandbox_id}/create-template:
    post:
      summary: Create template from sandbox
      description: Create a template from a running sandbox. The sandbox must be in running state.
      tags:
        - Sandboxes
      parameters:
        - name: sandbox_id
          in: path
          required: true
          schema:
            type: string
          description: Sandbox ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateFromSandboxRequest'
      responses:
        '200':
          description: Template creation initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      template_id:
                        type: string
                      name:
                        type: string
                      description:
                        type: string
                      default_cpu_count:
                        type: integer
                      default_memory_mb:
                        type: integer
                      is_public:
                        type: boolean
                      status:
                        type: string
                      harbor_project:
                        type: string
                      harbor_repository:
                        type: string
                      harbor_tag:
                        type: string
                      base_template_id:
                        type: string
                      ports:
                        type: string
                        description: JSON string of port configurations
                      custom_command:
                        type: string
                      ready_command:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                      message:
                        type: string
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Sandbox not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/sandboxes/{sandbox_id}/terminate:
    post:
      summary: Terminate sandbox
      description: Terminate a sandbox (keeps it visible in database)
      tags:
        - Sandboxes
      parameters:
        - name: sandbox_id
          in: path
          required: true
          schema:
            type: string
          description: Sandbox ID
        - name: force
          in: query
          schema:
            type: boolean
            default: false
          description: Force termination
      responses:
        '202':
          description: Sandbox termination initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      sandbox_id:
                        type: string
                      status:
                        type: string
                      note:
                        type: string
                  message:
                    type: string

  /v1/sandboxes/{sandbox_id}/start:
    post:
      summary: Start sandbox
      description: Start a created sandbox
      tags:
        - Sandboxes
      parameters:
        - name: sandbox_id
          in: path
          required: true
          schema:
            type: string
          description: Sandbox ID
      responses:
        '200':
          description: Sandbox started successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      domain:
                        type: string
                        description: Sandbox access domain
                  message:
                    type: string
        '400':
          description: Bad request (e.g., sandbox already running)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Sandbox not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/sandboxes/{sandbox_id}/stop:
    post:
      summary: Stop sandbox
      description: Stop a running sandbox
      tags:
        - Sandboxes
      parameters:
        - name: sandbox_id
          in: path
          required: true
          schema:
            type: string
          description: Sandbox ID
      responses:
        '200':
          description: Sandbox stopped successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Bad request (e.g., sandbox not running)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Sandbox not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/sandboxes/{sandbox_id}/deploy:
    post:
      summary: Deploy sandbox
      description: Deploy a sandbox using driver-based deployment
      tags:
        - Sandboxes
      parameters:
        - name: sandbox_id
          in: path
          required: true
          schema:
            type: string
          description: Sandbox ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cluster_id:
                  type: string
                  description: Target cluster ID (optional)
                cpu_count:
                  type: integer
                  description: Override CPU count (optional)
                memory_mb:
                  type: integer
                  description: Override memory in MB (optional)
      responses:
        '200':
          description: Sandbox deployed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SandboxDeploymentResponse'
                  message:
                    type: string
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Sandbox not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/sandboxes/stats:
    get:
      summary: Get sandbox statistics
      description: Get sandbox statistics for the current user
      tags:
        - Sandboxes
      responses:
        '200':
          description: Sandbox statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SandboxStatsResponse'

  /v1/sandboxes/batch-delete:
    post:
      summary: Batch delete sandboxes
      description: Delete multiple sandboxes in a single request
      tags:
        - Sandboxes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchDeleteRequest'
      responses:
        '200':
          description: Batch deletion results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/BatchDeleteResponse'
                  message:
                    type: string

  /v1/sandboxes/batch-terminate:
    post:
      summary: Batch terminate sandboxes
      description: Terminate multiple sandboxes in a single request
      tags:
        - Sandboxes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchTerminateRequest'
      responses:
        '202':
          description: Batch terminate initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/BatchOperationResponse'
                  message:
                    type: string

  /v1/sandboxes/batch-pause:
    post:
      summary: Batch pause sandboxes
      description: Pause multiple running sandboxes in a single request
      tags:
        - Sandboxes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchIdsRequest'
      responses:
        '202':
          description: Batch pause initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/BatchOperationResponse'
                  message:
                    type: string

  /v1/sandboxes/batch-resume:
    post:
      summary: Batch resume sandboxes
      description: Resume multiple paused sandboxes in a single request
      tags:
        - Sandboxes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchIdsRequest'
      responses:
        '202':
          description: Batch resume initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/BatchOperationResponse'
                  message:
                    type: string

  /v1/scalebox-regions:
    get:
      summary: Get available scalebox regions
      description: |
        Get a list of available Scalebox Regions that currently have eligible clusters.
        This is a public API (no authentication required) to help users discover
        available regions for locality-based scheduling.
      tags:
        - Sandboxes
      responses:
        '200':
          description: List of available scalebox regions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      scalebox_regions:
                        type: array
                        items:
                          $ref: '#/components/schemas/ScaleboxRegion'
                        description: List of available scalebox regions with eligible clusters
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/templates:
    get:
      summary: List templates
      tags:
        - Templates
      security:
        - ApiKeyAuth: []
      parameters:
        - name: usable
          in: query
          schema:
            type: boolean
          description: When true, return only templates usable for sandbox creation
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, building, pushing, available, failed]
        - name: visibility
          in: query
          schema:
            type: string
            enum: [private, account_shared, public]
        - name: name
          in: query
          schema:
            type: string
          description: Exact template name match
        - name: search
          in: query
          schema:
            type: string
          description: Partial match on name and description
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
        - name: skip
          in: query
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Paginated template list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ListTemplatesResponseData'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create template
      tags:
        - Templates
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateWriteRequestBody'
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/TemplateRecord'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/templates/storage-usage:
    get:
      summary: Private image storage usage
      tags:
        - Templates
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Storage usage payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PrivateImageStorageUsageData'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/templates/import:
    post:
      summary: Start direct template import from external image
      tags:
        - Templates
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DirectImportTemplateRequestBody'
      responses:
        '202':
          description: Template created and import accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/DirectImportAcceptedResponseData'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/templates/validate-custom-image:
    post:
      summary: Validate a custom container image
      tags:
        - Templates
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateCustomImageRequestBody'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ValidateCustomImageSuccessData'
        '400':
          description: Image validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
